<script>

const semanas = document.querySelectorAll('.semana');
const player = document.getElementById('player');
const audio = document.getElementById('audioPlayer');
const playerWeek = document.getElementById('playerWeek');

semanas.forEach(semana => {

  semana.addEventListener('click', function(e){

    e.preventDefault();

    const audioSrc = this.dataset.audio;

    if(!audioSrc || audioSrc.trim() === ''){
      alert('Áudio ainda não disponível.');
      return;
    }

    audio.src = audioSrc;

    const num = this.querySelector('.semana-num').innerText;
    const data = this.querySelector('.semana-data').innerText;

    playerWeek.innerText = `${num} • ${data}`;

    player.classList.add('active');

    audio.load();

    audio.play()
      .then(() => {
        console.log('Áudio iniciado');
      })
      .catch(err => {
        console.log('Erro ao tocar:', err);
      });

  });

});

function closePlayer(){

  player.classList.remove('active');

  audio.pause();
  audio.currentTime = 0;

}

player.addEventListener('click', function(e){

  if(e.target === player){
    closePlayer();
  }

});

</script>
